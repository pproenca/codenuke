repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(dist/|node_modules/|\.codenuke/|\.clawpatch/|.*\.tsbuildinfo$)'
      - id: end-of-file-fixer
        exclude: '^(dist/|node_modules/|\.codenuke/|\.clawpatch/|.*\.tsbuildinfo$)'
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files
        args: [--maxkb=500]
        exclude: '^(dist/|node_modules/|\.codenuke/|\.clawpatch/|.*\.tgz$)'
      - id: check-merge-conflict
      - id: detect-private-key

  # lint (oxlint), format (oxfmt), and dependency audit are not yet wired —
  # roadmap in CHANGELOG.md. Only the typecheck/test/build hooks below exist.
  - repo: local
    hooks:
      - id: pnpm-typecheck
        name: pnpm typecheck
        entry: pnpm typecheck
        language: system
        pass_filenames: false
      - id: pnpm-build
        name: pnpm build
        entry: pnpm build
        language: system
        pass_filenames: false
      - id: pnpm-test
        name: pnpm test
        entry: pnpm test
        language: system
        pass_filenames: false

name: OpenGrep

on:
  pull_request:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: OpenGrep scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install --disable-pip-version-check semgrep

      - name: Run OpenGrep-compatible rules
        run: semgrep scan --config security/opengrep/codenuke.yml --error

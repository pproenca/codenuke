rules:
  - id: codenuke.no-child-process-execsync-in-runtime
    message: Use the argv-vector exec substrate for codenuke-owned runtime commands; shell strings are reserved for documented trusted operator commands.
    severity: ERROR
    languages:
      - typescript
      - javascript
    patterns:
      - pattern: execSync($CMD, ...)
    paths:
      include:
        - /apps/**
        - /packages/**
      exclude:
        - "**/src/test/**"
        - "**/*.test.ts"
        - "**/*.test.js"
        - "**/dist/**"

  - id: codenuke.no-legacy-loop-runtime-import
    message: Legacy loop .mjs files are characterization fixtures only and must not be imported by runtime code.
    severity: ERROR
    languages:
      - typescript
      - javascript
    pattern-either:
      - pattern: import $X from ".../test-fixtures/legacy-loop/$FILE"
      - pattern: import(".../test-fixtures/legacy-loop/$FILE")
      - pattern: require(".../test-fixtures/legacy-loop/$FILE")
    paths:
      include:
        - /apps/**
        - /packages/**
      exclude:
        - "**/src/test/**"
        - "**/*.test.ts"
        - "**/*.test.js"
        - "**/dist/**"

  - id: codenuke.no-obvious-hardcoded-secret
    message: Do not commit realistic secret-looking values; use placeholders or test-only dummy values that are obviously fake.
    severity: ERROR
    languages:
      - generic
    pattern-regex: (?i)\b(api[_-]?key|access[_-]?token|secret|password)\b\s*[:=]\s*['"][A-Za-z0-9_./+=-]{24,}['"]
    paths:
      include:
        - /apps/**
        - /packages/**
        - /.github/**
      exclude:
        - "**/src/test/**"
        - "**/*.test.ts"
        - "**/dist/**"
        - "/apps/cli/CHANGELOG.md"

  - id: codenuke.no-committed-runtime-artifact-write-in-harness
    message: Maintainer harness files should not write codenuke runtime state or tarballs into the repository.
    severity: ERROR
    languages:
      - generic
    pattern-regex: (?i)\b(writeFileSync|cp|mv|tar|npm\s+pack)\b.*(\.codenuke/|\.clawpatch/|\.tgz\b)
    paths:
      include:
        - /.agents/**
        - /.github/**
      exclude:
        - "**/dist/**"
